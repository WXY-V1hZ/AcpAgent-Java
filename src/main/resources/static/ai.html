<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Test</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fff; --text: #333; --sub: #666; --border: #eee; --input-bg: #fff;
    --input-border: #d9d9d9; --bubble-user: #1677ff; --bubble-ai-bg: #f0f0f0;
    --reason-bg: #fffbe6; --reason-border: #ffe58f; --reason-text: #8c6a00;
  }
  :root.dark {
    --bg: #1e1e1e; --text: #ddd; --sub: #999; --border: #333; --input-bg: #2a2a2a;
    --input-border: #444; --bubble-ai-bg: #2a2a2a; --reason-bg: #332d1a;
    --reason-border: #665500; --reason-text: #d4a800;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; background: var(--bg); color: var(--text); }
  #toolbar { display: flex; justify-content: flex-end; padding: 8px 20px; }
  #theme-btn { background: none; border: 1px solid var(--input-border); color: var(--sub); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; }
  .msg { margin-bottom: 16px; max-width: 80%; }
  .msg.user { margin-left: auto; text-align: right; }
  .msg.assistant { margin-right: auto; }
  .msg .role { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
  .msg .content { padding: 10px 14px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.user .content { background: var(--bubble-user); color: #fff; }
  .msg.assistant .content { background: var(--bubble-ai-bg); color: var(--text); }
  .reasoning { background: var(--reason-bg); border: 1px solid var(--reason-border); border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; font-size: 13px; color: var(--reason-text); }
  .tool { font-size: 12px; color: var(--sub); margin-top: 4px; }
  #input-area { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg); }
  #input { flex: 1; padding: 10px 14px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 14px; outline: none; background: var(--input-bg); color: var(--text); }
  #input:focus { border-color: #1677ff; }
  #send { padding: 10px 24px; background: #1677ff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { text-align: center; font-size: 12px; color: var(--sub); padding: 4px; }
  /* markdown */
  .msg.assistant .content pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .msg.assistant .content code { font-family: monospace; font-size: 13px; }
  .msg.assistant .content :not(pre)>code { background: rgba(0,0,0,.06); padding: 1px 4px; border-radius: 4px; }
  .msg.assistant .content table { border-collapse: collapse; margin: 8px 0; }
  .msg.assistant .content td,.msg.assistant .content th { border: 1px solid var(--border); padding: 6px 10px; }
</style>
</head>
<body>
<div id="toolbar"><button id="theme-btn" onclick="toggleTheme()">暗黑</button></div>
<div id="chat"></div>
<div id="input-area">
  <input id="input" placeholder="输入消息..." autofocus />
  <button id="send" onclick="send()">发送</button>
</div>
<div id="status" class="status">就绪</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const themeBtn = document.getElementById('theme-btn');
const root = document.documentElement;

// 会话 ID（页面刷新不变，关闭页面重新生成）
function getSessionId() {
  let sid = sessionStorage.getItem('sessionId');
  if (!sid) {
    sid = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    sessionStorage.setItem('sessionId', sid);
  }
  return sid;
}

// 主题切换
const theme = localStorage.getItem('theme') || 'light';
applyTheme(theme);

function applyTheme(t) {
  root.classList.toggle('dark', t === 'dark');
  themeBtn.textContent = t === 'dark' ? '亮色' : '暗黑';
}

function toggleTheme() {
  const next = root.classList.contains('dark') ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('theme', next);
}

// 当前显示的 assistant 消息 DOM 容器（流式追加用）
let currentMsgEl = null;
let currentReasoningEl = null;
let currentToolEl = null;
let answerBuffer = '';

function appendUser(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="role">你</div><div class="content">${escapeHtml(text)}</div>`;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function initAssistant() {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = '<div class="role">AI</div>';
  currentReasoningEl = document.createElement('div');
  currentReasoningEl.className = 'reasoning';
  currentReasoningEl.style.display = 'none';
  el.appendChild(currentReasoningEl);
  currentToolEl = document.createElement('div');
  currentToolEl.className = 'tool';
  currentToolEl.style.display = 'none';
  el.appendChild(currentToolEl);
  const content = document.createElement('div');
  content.className = 'content';
  el.appendChild(content);
  chat.appendChild(el);
  currentMsgEl = content;
  answerBuffer = '';
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;
  statusEl.textContent = '发送中...';

  appendUser(text);
  initAssistant();

  try {
    const resp = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId: getSessionId() })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop(); // 保留最后一个不完整行
      for (const line of lines) {
        if (line.startsWith('event:')) {
          var eventType = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          handleEvent(eventType, line.slice(5).trim());
        }
      }
    }
  } catch (e) {
    if (currentMsgEl) currentMsgEl.textContent += `\n[错误: ${e.message}]`;
    statusEl.textContent = '连接失败';
  } finally {
    sendBtn.disabled = false;
    currentMsgEl = null;
    currentReasoningEl = null;
    currentToolEl = null;
    statusEl.textContent = '就绪';
  }
}

var eventType = '';
function handleEvent(type, data) {
  try { var json = JSON.parse(data); } catch(e) { return; }
  switch (type) {
    case 'answer':
      if (json.type === 'content' && json.data) {
        answerBuffer += json.data;
        currentMsgEl.innerHTML = marked.parse(answerBuffer);
        chat.scrollTop = chat.scrollHeight;
      }
      break;
    case 'reasoning':
      if (json.type === 'content' && json.data) {
        currentReasoningEl.style.display = 'block';
        currentReasoningEl.textContent += json.data;
        chat.scrollTop = chat.scrollHeight;
      }
      break;
    case 'tool':
      if (json.type === 'content' && json.data) {
        currentToolEl.style.display = 'block';
        currentToolEl.textContent += json.data + '\n';
        chat.scrollTop = chat.scrollHeight;
      }
      break;
    case 'message':
      if (json.type === 'done') {
        statusEl.textContent = '完成';
      } else if (json.type === 'error') {
        if (currentMsgEl) currentMsgEl.textContent += `\n[${json.message}]`;
        statusEl.textContent = '出错';
      }
      break;
    case 'usage':
      if (json.type === 'content' && json.data) {
        statusEl.textContent = json.data;
      }
      break;
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
